<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaehyun Portfolio</title>
    <link rel="stylesheet" href="./css/style.css">

    <script src="./js/theme.js" defer></script>
    <script src="./js/github.js" defer></script>
    <script src="./js/form.js" defer></script>
    <script src="./js/animation.js" defer></script>
    <script src="./js/main.js" defer></script>
</head>
<body>

    <header>
        <nav class="navbar">
            <h1 class="logo">Jaehyun</h1>

            <button id="theme-toggle" class="theme-btn">🌙</button>

            <ul class="nav-menu">
                <li><a href="#hero">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#skills">Skills</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>

            <button class="menu-btn">
                ☰
            </button>
        </nav>
    </header>

    <main>

        <section id="hero" class="fade-in">
            <h2>안녕하세요.</h2>
            <p>컴퓨터공학을 공부하는 재현입니다.</p>
            <a href="#projects" class="btn">프로젝트 보기</a>
        </section>

        <section id="about" class="fade-in">
            <h2>About Me</h2>
            <article class="about-container">
                <img src="./images/profile.jpg" alt="재현 프로필 이미지">
                <div class="about-text">
                    <p>백엔드, Linux, Docker, 시스템 프로그래밍에 관심이 있습니다.</p>
                </div>
            </article>
        </section>

        <section id="skills" class="fade-in">
            <h2>Skills</h2>
            <ul class="skill-list">
                <li>C</li>
                <li>C++</li>
                <li>Linux</li>
                <li>Docker</li>
                <li>Git</li>
                <li>JavaScript</li>
            </ul>
        </section>

        <section id="projects" class="fade-in">
            <h2>Projects</h2>

            <div class="filter-container">
                <button class="filter-btn active" data-lang="all">All</button>
                <button class="filter-btn" data-lang="c">C/C++</button>
                <button class="filter-btn" data-lang="javascript">JavaScript</button>
                <button class="filter-btn" data-lang="other">Others</button>
            </div>

            <div class="project-grid" id="project-container">
                <article class="project-card">
                    <h3>Loading...</h3>
                    <p>GitHub API 연동 중</p>
                </article>
            </div>
        </section>

        <section id="contact" class="fade-in">
            <h2>Contact</h2>
            <form id="contact-form" novalidate>
                <div>
                    <label for="name">이름</label>
